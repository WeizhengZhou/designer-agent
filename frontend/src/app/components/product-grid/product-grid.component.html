<div class="product-grid-panel">
  @if (products.length === 0) {
    <div class="empty-products">
      <div class="empty-icon">🔍</div>
      <h3>No products yet</h3>
      <p>Start a conversation with the AI designer to discover furniture tailored to your style.</p>
    </div>
  } @else {
    <!-- Toolbar -->
    <div class="grid-toolbar">
      <span class="count-label">{{ products.length }} items found</span>
      <input class="filter-input" type="text" placeholder="Filter…" [(ngModel)]="filterText" />
      <select class="sort-select" [(ngModel)]="sortKey">
        <option value="rating">Top Rated</option>
        <option value="price_asc">Price: Low → High</option>
        <option value="price_desc">Price: High → Low</option>
      </select>
    </div>

    <!-- Grid -->
    <div class="grid">
      @for (p of filtered; track p.id) {
        <app-product-card
          [product]="p"
          (cardClick)="selectProduct($event)"
        ></app-product-card>
      }
    </div>
  }
</div>
